AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Pipeline d'Ingestion IoT Temps R\xE9el et Espace Documentaire S\xE9\
  curis\xE9"
Parameters:
  StudentRoleARN:
    Type: String
    Description: ARN du role IAM existant pour le compte etudiant AWS.
    Default: arn:aws:iam::629193321657:role/ongartobaye-lambda-s3-trigger-s-LambdaExecutionRole-QYXr9hheqURI
Resources:
  IoTRawDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: io-raw-data-lake-${AWS::AccountId}-${AWS::Region}-v2
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  IoTRawDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: IoTRawDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowLambdaWriteS3
          Effect: Allow
          Principal:
            AWS:
              Ref: StudentRoleARN
          Action:
          - s3:PutObject
          - s3:PutObjectAcl
          Resource:
            Fn::Sub: arn:aws:s3:::${IoTRawDataBucket}/*
  IoTFeatureStoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ongartobaye-feature-store-${AWS::StackName}
      AttributeDefinitions:
      - AttributeName: requestId
        AttributeType: S
      KeySchema:
      - AttributeName: requestId
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  LambdaDynamoDBAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName:
        Fn::Sub: LambdaDynamoDBAccess-${AWS::StackName}
      Roles:
      - Fn::Select:
        - 1
        - Fn::Split:
          - /
          - Fn::Select:
            - 5
            - Fn::Split:
              - ':'
              - Ref: StudentRoleARN
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowDynamoDBWrite
          Effect: Allow
          Action:
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:GetItem
          - dynamodb:Scan
          Resource:
            Fn::GetAtt:
            - IoTFeatureStoreTable
            - Arn
  IoTProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: IoTProcessingFunction
      Handler: index.handler
      Runtime: python3.11
      Timeout: 30
      Role:
        Ref: StudentRoleARN
      Environment:
        Variables:
          S3_BUCKET:
            Ref: IoTRawDataBucket
          DYNAMODB_TABLE:
            Ref: IoTFeatureStoreTable
      Events:
        IoTInboundAPI:
          Type: Api
          Properties:
            Path: /ingest
            Method: ANY
    Metadata:
      SamResourceId: IoTProcessingFunction
  TechDocBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: tech-doc-${AWS::AccountId}-${AWS::Region}-v2
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
Outputs:
  ApiGatewayIngestionURL:
    Description: URL directe API Gateway pour l'envoi des donnees IoT (POST)
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/ingest
  TechDocBucketName:
    Description: Nom du bucket S3 de la documentation technique pour l'upload
    Value:
      Ref: TechDocBucket
